services:
  odoo:
    image: odoo:19.0
    depends_on:
      - db
    ports:
      - "8069:8069"
    command: >
      odoo -d odoo19
           -i base
           --db_host=db
           --db_user=odoo
           --db_password=odoo123
    volumes:
      - odoo-data:/var/lib/odoo
      - ./config:/etc/odoo
      - ./addons:/mnt/extra-addons

  db:
    image: postgres:18
    environment:
      - POSTGRES_DB=odoo_db
      - POSTGRES_PASSWORD=odoo123
      - POSTGRES_USER=odoo
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - db-data:/var/lib/postgresql/data/pgdata

volumes:
  odoo-data:
  db-data: